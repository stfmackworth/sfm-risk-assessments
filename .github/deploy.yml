name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_SHEET_ID: ${{ secrets.VITE_SHEET_ID }}
          VITE_SHEETS_API_KEY: ${{ secrets.VITE_SHEETS_API_KEY }}
          VITE_CLIENT_EMAIL: ${{ secrets.VITE_CLIENT_EMAIL }}
          VITE_PRIVATE_KEY: ${{ secrets.VITE_PRIVATE_KEY }}
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
